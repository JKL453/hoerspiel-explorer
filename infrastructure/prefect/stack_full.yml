version: "3.8"

services:
  prefect-postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - ${VOLUME_TARGET}/prefect/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default


  prefect-redis:
    image: redis:7
    volumes:
      - ${VOLUME_TARGET}/prefect/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default


  prefect-server:
    image: prefecthq/prefect:3-latest
    depends_on:
      - prefect-postgres
      - prefect-redis
    environment:
      - TZ=Europe/Berlin
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@prefect-postgres:5432/prefect
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_SERVER_UI_API_URL=https://prefect.${HOST_URL}/api
      - PREFECT_MESSAGING_BROKER=prefect_redis.messaging
      - PREFECT_MESSAGING_CACHE=prefect_redis.messaging
      - PREFECT_REDIS_MESSAGING_HOST=prefect-redis
      - PREFECT_REDIS_MESSAGING_PORT=6379
      - PREFECT_REDIS_MESSAGING_DB=0
    command: prefect server start --no-services
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prefect.entrypoints=http"
        - "traefik.http.routers.prefect.rule=Host(`prefect.${HOST_URL}`)"
        - "traefik.http.middlewares.prefect-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.prefect.middlewares=prefect-https-redirect"
        - "traefik.http.routers.prefect-secure.entrypoints=https"
        - "traefik.http.routers.prefect-secure.rule=Host(`prefect.${HOST_URL}`)"
        - "traefik.http.routers.prefect-secure.tls=true"
        - "traefik.http.routers.prefect-secure.service=prefect"
        - "traefik.http.services.prefect.loadbalancer.server.port=4200"
        - "traefik.docker.network=proxy"
    networks:
      - proxy
      - default
      

  prefect-services:
    image: prefecthq/prefect:3-latest
    depends_on:
      - prefect-server
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@prefect-postgres:5432/prefect
      - PREFECT_MESSAGING_BROKER=prefect_redis.messaging
      - PREFECT_MESSAGING_CACHE=prefect_redis.messaging
      - PREFECT_REDIS_MESSAGING_HOST=prefect-redis
      - PREFECT_REDIS_MESSAGING_PORT=6379
      - PREFECT_REDIS_MESSAGING_DB=0
    command: prefect server services start
    networks:
      - default


  prefect-worker:
    image: prefecthq/prefect:3-latest
    depends_on:
      - prefect-server
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: prefect worker start --pool local-pool
    restart: on-failure
    networks:
      - default
      

networks:
  default:
  proxy:
    external: true