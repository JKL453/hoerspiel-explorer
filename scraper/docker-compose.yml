# Local testing:
#   cd scraper && docker compose up --build
#   or from project root: docker compose -f scraper/docker-compose.yml up --build
#
# For Portainer: build & push, then deploy via stack.yml
#   docker build -f scraper/Dockerfile -t <registry>/hoerspiel-scraper:latest .
#   docker push <registry>/hoerspiel-scraper:latest

services:
  scraper:
    build:
      context: ..
      dockerfile: scraper/Dockerfile
    image: hoerspiel-scraper:latest
    container_name: hoerspiel-scraper
    restart: unless-stopped
    ports:
      - "5123:5123"
    volumes:
      - ../data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
