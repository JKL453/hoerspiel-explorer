# Portainer Stack deployment
#
# 1. Build and push the image from the project root:
#      docker build -t <registry>/hoerspiel-scraper:latest .
#      docker push <registry>/hoerspiel-scraper:latest
#
# 2. In Portainer: Stacks → Add Stack → paste this file
#    Replace <registry>/hoerspiel-scraper:latest with your actual image.

version: "3.8"

services:
  scraper:
    image: <registry>/hoerspiel-scraper:latest
    ports:
      - "5123:5123"
    volumes:
      - hoerspiel-data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      # Pin to a specific node (set label first: docker node update --label-add scraper=true <node-id>)
      # placement:
      #   constraints:
      #     - node.labels.scraper == true

volumes:
  hoerspiel-data:
